name: Structure check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check API551 source/archive model
        run: |
          python3 - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          active = [
              "API551_SOURCE_MANIFEST_CURRENT.json",
              "API551_CONSOLIDATED_POLICIES_and_RULES_CURRENT_2026-06-18.md",
              "TZ_API551_PROJECT_STAGE4_CONSOLIDATED_CURRENT_2026-06-18.md",
              "api551_approved_label_master_v1.csv",
              "TZ_API551_translation_project_RU.md",
              "API 551 2016 (R2024).pdf",
          ]
          archived = [
              "API_551_STAGE2_REFERENCE_FILES_v1.zip",
              "API_551_STAGE3_SOURCE_PACKAGE_v1.zip",
              "api551_control_build_v1.zip",
          ]
          required_dirs = [
              "source",
              "workspace/figures",
              "docs",
              "archive/source-packages",
              "archive/extracted-reference",
              ".github/workflows",
          ]
          for dirname in required_dirs:
              if not Path(dirname).is_dir():
                  raise SystemExit(f"missing required folder: {dirname}")

          source_files = sorted(p.name for p in Path("source").iterdir() if p.is_file())
          if source_files != sorted(active):
              raise SystemExit(f"source/ file set mismatch: {source_files}")
          if list(Path("source").glob("*.zip")):
              raise SystemExit("source/ must not contain ZIP packages")

          manifest = json.loads(Path("source/API551_SOURCE_MANIFEST_CURRENT.json").read_text(encoding="utf-8"))
          folder = manifest["canonical_source_policy"]["primary_source_folder"]
          folder_id = "1uLQQ1XHveKaUzLgULQ84jYUD1GYMWPKX"
          folder_url = f"https://drive.google.com/drive/folders/{folder_id}"
          if folder.get("folder_id") != folder_id or folder.get("url") != folder_url:
              raise SystemExit("manifest Drive source folder mismatch")
          if folder.get("file_count_via_drive_api") != 6:
              raise SystemExit("manifest Drive source file count must be 6")
          if manifest.get("drive_context", {}).get("source_folder_id") != folder_id:
              raise SystemExit("manifest drive_context.source_folder_id mismatch")

          manifest_files = {item["file"] for item in manifest.get("mandatory_sources", [])}
          manifest_files.update(item["name"] for item in manifest.get("active_source_working_files", []))
          if manifest_files != set(active):
              raise SystemExit(f"manifest active file set mismatch: {sorted(manifest_files)}")

          archived_records = {item["file"]: item for item in manifest.get("archived_source_packages", [])}
          if set(archived_records) != set(archived):
              raise SystemExit("manifest archived_source_packages mismatch")
          for name in archived:
              path = Path("archive/source-packages") / name
              if not path.is_file():
                  raise SystemExit(f"missing archived package: {path}")
              record = archived_records[name]
              if record.get("archive_path") != str(path):
                  raise SystemExit(f"archive_path mismatch for {name}")
              if "forbidden as generation input" not in record.get("role", ""):
                  raise SystemExit(f"archived package role must forbid generation input: {name}")

          ref = json.loads(Path("archive/extracted-reference/EXTRACTED_REFERENCE_MANIFEST.json").read_text(encoding="utf-8"))
          if ref.get("status") != "archive_reference_index_only_not_generation_input":
              raise SystemExit("wrong extracted reference manifest status")
          if ref.get("extracted_files_created_in_repo") != []:
              raise SystemExit("extracted reference index must not create derived files as repo inputs")
          for item in ref.get("selected_reference_members", []):
              suffix = Path(item.get("source_member", "")).suffix.lower()
              if suffix in {".html", ".png", ".jpg", ".jpeg", ".zip", ".pdf"}:
                  raise SystemExit(f"forbidden reference member selected: {item}")

          lfs_pointer_prefix = b"version https://git-lfs.github.com/spec/v1"
          for name in active:
              path = Path("source") / name
              data = path.read_bytes()
              if not data:
                  raise SystemExit(f"{path} is empty")
              if data.startswith(lfs_pointer_prefix):
                  raise SystemExit(f"{path} is a Git LFS pointer, not usable content")

          pdf = Path("source/API 551 2016 (R2024).pdf")
          pdf_size = pdf.stat().st_size
          expected_pdf_size = 8089772
          if pdf_size != expected_pdf_size:
              raise SystemExit(f"{pdf} size mismatch: expected {expected_pdf_size}, got {pdf_size}")
          if not pdf.read_bytes()[:5].startswith(b"%PDF"):
              raise SystemExit("source PDF does not start with %PDF")

          expected_zip_oid = {
              "API_551_STAGE2_REFERENCE_FILES_v1.zip": "cda3e972a0acc5104e61a538c19f5c301c554eab03abd1bf868474f12babdf70",
              "API_551_STAGE3_SOURCE_PACKAGE_v1.zip": "5a6d1bb1fb099dd5346297855b57758e68b503d84bdb890b0c775650d4fd7643",
              "api551_control_build_v1.zip": "c9a8c330b0b20eb1c7b3f82dbf98eafa3409aec3611ff874419ecb3c5b627cc2",
          }
          for item in manifest.get("archived_source_packages", []):
              path = Path(item["archive_path"])
              data = path.read_bytes()
              if data.startswith(b"PK"):
                  if path.stat().st_size != int(item["local_size"]):
                      raise SystemExit(f"{path} size mismatch after LFS smudge")
                  with zipfile.ZipFile(path) as zf:
                      bad = zf.testzip()
                  if bad is not None:
                      raise SystemExit(f"{path} ZIP integrity failed at {bad}")
                  continue
              text = data.decode("utf-8", errors="replace")
              expected_oid = expected_zip_oid[item["file"]]
              expected_size = str(item["local_size"])
              if "version https://git-lfs.github.com/spec/v1" not in text:
                  raise SystemExit(f"{path} is neither ZIP nor LFS pointer")
              if f"oid sha256:{expected_oid}" not in text or f"size {expected_size}" not in text:
                  raise SystemExit(f"{path} LFS pointer does not match expected oid/size")

          readme = Path("README.md").read_text(encoding="utf-8")
          workflow = Path(".github/workflows/structure-check.yml").read_text(encoding="utf-8")
          for name in active + archived:
              if name not in readme:
                  raise SystemExit(f"README does not mention {name}")
              if name not in workflow:
                  raise SystemExit(f"workflow does not mention {name}")
          print("API551 source/archive model OK")
          PY

      - name: Validate JSON files
        run: |
          python3 -m json.tool source/API551_SOURCE_MANIFEST_CURRENT.json > /dev/null
          python3 -m json.tool archive/extracted-reference/EXTRACTED_REFERENCE_MANIFEST.json > /dev/null
          python3 -m json.tool catalog.json > /dev/null

      - name: Check catalog Stage 4 status
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("catalog.json").read_text(encoding="utf-8"))
          figures = catalog.get("figures", [])
          if len(figures) != 69:
              raise SystemExit(f"catalog must contain 69 figures, got {len(figures)}")
          accepted_expected = {1, 4, 9, 14, 16, 18, 23, 25, 28, 30, 31, 33, 37, 46, 48, 50, 52, 62, 66}
          accepted = {int(f["figure_no"]) for f in figures if f.get("status") == "accepted"}
          changed = [f for f in figures if str(f.get("status", "")).startswith("измененно_")]
          not_accepted = [f for f in figures if f.get("status") == "not_accepted"]
          if accepted != accepted_expected:
              raise SystemExit(f"accepted figure set mismatch: {sorted(accepted)}")
          if len(changed) != 1 or int(changed[0]["figure_no"]) != 51:
              raise SystemExit("Figure 51 must be the only changed/review figure")
          if changed[0].get("status") != "измененно_2026-06-17":
              raise SystemExit("Figure 51 status must be измененно_2026-06-17")
          if len(not_accepted) != 49:
              raise SystemExit(f"not_accepted count mismatch: {len(not_accepted)}")
          expected_stats = {"total": 69, "accepted": 19, "changed": 1, "not_accepted": 49}
          if catalog.get("stats", {}) != expected_stats:
              raise SystemExit("catalog stats mismatch")
          print("catalog Stage 4 status OK")
          PY
      - name: Check portable relative review links
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          root_files = [Path("index.html"), Path("catalog.json")]
          figure_html = sorted(Path("workspace/figures").glob("*/figure_*.html"))
          files = root_files + figure_html
          for path in files:
              text = path.read_text(encoding="utf-8", errors="replace")
              if "file:///C:/" in text or "C:/Downloads/" in text:
                  raise SystemExit(f"absolute Windows path is forbidden: {path}")

          catalog = json.loads(Path("catalog.json").read_text(encoding="utf-8"))
          for fig in catalog.get("figures", []):
              link = fig.get("source_pdf_link", "")
              if not link.startswith("source/API%20551%202016%20(R2024).pdf#page="):
                  raise SystemExit(f"bad root PDF link for Figure {fig.get('figure_no')}: {link}")
              for key in ["folder", "html", "json", "png", "source_crop", "out_html"]:
                  value = fig.get(key)
                  if value and value.startswith("figures/"):
                      raise SystemExit(f"non-portable catalog path for Figure {fig.get('figure_no')} {key}: {value}")

          index = Path("index.html").read_text(encoding="utf-8", errors="replace")
          if 'href="figures/' in index:
              raise SystemExit("index.html still points to root figures/")
          if "source/API%20551%202016%20(R2024).pdf#page=" not in index:
              raise SystemExit("index.html has no relative source PDF links")

          for path in figure_html:
              text = path.read_text(encoding="utf-8", errors="replace")
              if "../../../source/API%20551%202016%20(R2024).pdf#page=" not in text:
                  raise SystemExit(f"Figure HTML has no relative source PDF link: {path}")
              for src in re.findall(r"<img[^>]+src=[\"']([^\"']+)[\"']", text, flags=re.I):
                  if src.startswith(("http://", "https://", "data:")):
                      continue
                  image_path = path.parent / src
                  if not image_path.is_file():
                      raise SystemExit(f"broken image reference {src} in {path}")
          fig66_out = Path("workspace/figures/066/figure_066.out.html").read_text(encoding="utf-8", errors="replace")
          fig66_json = Path("workspace/figures/066/figure_066.object.json").read_text(encoding="utf-8", errors="replace")
          for needle in [
              'data-figure-kind="reconstructed_table_with_embedded_drawing"',
              'class="reconstructed-table"',
              '<th colspan="2">Расход газа</th>',
              '<th colspan="2">Расход жидкости</th>',
              '<td>≥4″</td>',
              'figure_066.png',
          ]:
              if needle not in fig66_out:
                  raise SystemExit(f"Figure 66 reconstructed object missing fragment: {needle}")
          if "file:///C:/" in fig66_json or "C:/Downloads/" in fig66_json:
              raise SystemExit("Figure 66 object JSON contains absolute Windows path")
          print("Figure 66 reconstructed table check OK")
          print("portable relative review links OK")
          PY
